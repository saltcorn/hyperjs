[package]
authors = ["LongYinan <lynweklm@gmail.com>"]
edition = "2024"
name = "hyperjs"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
bytes = "1.11.0"
http-body-util = "0.1.3"
httpdate = "1.0.3"
hyper = {version = "1.8.1", features = ["full"]}
hyper-util = {version = "0.1.19", features = ["tokio"]}
lazy_static = "1.5.0"
matchit = "0.9.1"
mime_guess = "2.0.5"
napi = {version = "3.0.0", features = ["napi5"]}
napi-derive = "3.0.0"
tokio = {version = "1.48.0", features = ["rt", "net", "rt-multi-thread"]}
urlencoding = "2.1.3"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
